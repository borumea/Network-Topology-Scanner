# =============================================================================
# NETWORKING MODEL: bridge (named network "nts-net")
#
# All services communicate by container name, NOT localhost. This is required
# for Mac compatibility — network_mode: host only works on Linux.
#
# Docker mode (inside containers):
#   REDIS_URL=redis://redis:6379/0
#   backend API: http://backend:8000
#
# Bare-metal dev (running backend locally, no Docker):
#   REDIS_URL=redis://localhost:6379/0
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    networks:
      - nts-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    networks:
      - nts-net
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file: .env
    ports:
      - "8000:8000"   # Direct API access during dev
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - nts-net
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  nts-net:
    driver: bridge

