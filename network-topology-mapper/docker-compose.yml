# =============================================================================
# NETWORKING MODEL: bridge (named network "nts-net")
#
# All services communicate by container name, NOT localhost. This is required
# for Mac compatibility — network_mode: host only works on Linux.
#
# Docker mode (inside containers):
#   NEO4J_URI=bolt://neo4j:7687
#   REDIS_URL=redis://redis:6379/0
#   backend API: http://backend:8000
#
# Bare-metal dev (running backend locally, no Docker):
#   NEO4J_URI=bolt://localhost:7687
#   REDIS_URL=redis://localhost:6379/0
# =============================================================================

services:
  neo4j:
    image: neo4j:5-community
    networks:
      - nts-net
    environment:
      NEO4J_AUTH: neo4j/changeme
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"   # Neo4j browser (debug only)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - nts-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    networks:
      - nts-net
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file: .env
    ports:
      - "8000:8000"   # Direct API access during dev
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    networks:
      - nts-net
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  nts-net:
    driver: bridge

volumes:
  neo4j_data:
