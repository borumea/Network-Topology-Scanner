# =============================================================================
# NETWORKING MODEL: bridge (named network "nts-net")
#
# All services communicate by container name, NOT localhost. This is required
# for Mac compatibility — network_mode: host only works on Linux.
#
# Docker mode (inside containers):
#   NEO4J_URI=bolt://neo4j:7687
#   REDIS_URL=redis://redis:6379/0
#   backend API: http://backend:8000
#
# Bare-metal dev (running backend locally, no Docker):
#   NEO4J_URI=bolt://localhost:7687
#   REDIS_URL=redis://localhost:6379/0
#
# Bridge networking is implemented in WO-047. This comment documents the
# decision so downstream WOs set .env defaults correctly.
# =============================================================================

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    env_file: .env
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    network_mode: host
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
